start_year : 2018
end_year : 2030
year_column_width: 12
first_forecast_year : 2022
zoom_scale: 135 # how to scale the worksheets
bank_interest: Income:I:Invest income:Int:Bank

# The table styles are seen on the table tab in excel broken into Light, Medium and Dark.
# The number seems to be the index in that list (top to bottom, left to right, origin 1)
sheet_groups:
  acct-bal:
    color: 4FA3DB
    table_style: TableStyleMedium2
  income-expense:
    color: BDAE2D
    table_style: TableStyleMedium12
  retirement:
    color: 910DBD
    table_style: TableStyleMedium10
  actuals:
    color: 58BD2D
    table_style: TableStyleMedium7
  taxes:
    color: BD710D
    table_style: TableStyleMedium2
  tables:
    color: 7E0505
    table_style: TableStyleMedium5
sheets:
  accounts:
    sheet_group: acct-bal
    tables:
      - name: tbl_accounts
        title: Accounts
        include_years: false
        columns:
          - name: Account
            width: 28
          - name: Type
            width: 12
          - name: Income Txbl
          - name: Active
          - name: Rlz share
          - name: Unrlz share
          - name: Actl_source
            width: 28
          - name: Actl_source_tab
            width: 17
          - name: Fcst_source
            width: 28
          - name: Fcst_source_tab
            width: 18
          - name: Notes
            width: 55
        data: &acct_data_info
          source: local
          type: md_acct
          path: ./data/2022 Account Balances.tsv
          group:
          - Bank Accounts
          - Credit Cards
          - Real Estate
          - Other Asset
          - Liabilities
          - Mortgage Loans
          - Non Mort Loans
          no_details_for:
          - Assets
          - Loans
          - Investment Accounts
          include_zeros:
          - 529 - ML
          - Capital One Investing
          - 401K - GBD MML - Pre-tax
          - 401K - GBD MML - Roth
          - CHET - Ben
          - HSA - GBD - Devenir
          - HSA - G - Invest
          tax_free_keys:
          - 401K
          - CHET
          - "529"
          - IRA

  balances:
    sheet_group: acct-bal
    tables:
      - name: tbl_balances
        title: Balances
        include_years: true
        columns:
        - name: Key
          width: 38
        - name: ValType
          width: 12
        - name: AcctName
          width: 28
        - name: Type
          width: 12
        - name: Income Txbl
        - name: Active
        hidden:
        - Key
        data:
          <<: *acct_data_info
          type: md_bal
          path: ./data/2017 Account Balances.tsv
  iande:
    sheet_group: income-expense
    tables:
      - name: tbl_iande
        title: Income and Expense
        include_years: true
        columns:
        - name: Key
          width: 70
        - name: Account
          width: 30
        hidden:
        - Key
        data: &iande_data_info
          source: local
          type: md_iande_actl
          path: ./data/iande.tsv
          sheet: iande    
  aux:
    sheet_group: income-expense
    tables:
      - name: tbl_aux
        title: Auxiliary data and calculations - DO NOT SORT
        include_years: true
        columns:
        - name: Line
          width: 52
        - name: Source
          width: 52
        - name: Source Table
          width: 16
        - name: Sign
          width: 12
        - name: Type
          width: 12
        - name: Accum_by
          width: 18
  retirement:
    sheet_group: retirement
    tables:
      - name: tbl_retir_vals
        title: Retirement Income & Expense Plan
        include_years: true
        columns:
        - name: Item
          width: 28
        - name: Who
          width: 12
        - name: who1
          width: 12
        - name: Type
          width: 12
        - name: Firm
          width: 18
        - name: Election
          width: 18
        - name: Start Date
          width: 16
        - name: Yearly
          width: 12
        hidden:
        - who1
  retireparms:
    sheet_group: retirement
    tables:
    - name: tbl_retir_parms
      title: Retirement Parameters
      include_years: false
      columns:
      - name: Code
        width: 30
      - name: Description
        width: 40
      - name: G
        width: 15
      - name: V
      - name: who1
      - name: Months
      - name: Date
      - name: Rate
    - name: tbl_pens_facts
      title: Pension Facts
      include_years: false
      title_row: 48
      columns:
      - name: Pension
      - name: Source of info
      - name: COLA
      - name: Single
      - name: EE50
      - name: Spouse50
      - name: EE75
      - name: Spouse75
      - name: EE100
        width: 14
      - name: Spouse100
      - name: Lump
      - name: 10 year certain
  iande_actl:
    sheet_group: actuals
    tables:
    - name: tbl_iande_actl
      title: Income and Expense Actuals
      include_years: true
      actual_only: true
      columns:
      - name: Key
        width: 35
      - name: Account
      hidden:
      - Key
      data: 
        <<: *iande_data_info
        sheet: iande_actl
  manual_actl:
    sheet_group: actuals
    tables:
    - name: tbl_manual_actl
      title: Manually input actual items
      include_years: true
      actual_only: true
      columns:
      - name: Item
        width: 40
      - name: Notes
  transfers_actl:
    sheet_group: actuals
    tables:
    - name: tbl_transfers_actl
      title: Actual transfers between accounts
      include_years: true
      actual_only: true
      columns:
      - name: Account
        width: 50
  invest_actl:
    sheet_group: actuals
    tables:
    - name: tbl_invest_actl
      title: Investment gains, losses and transfers
      include_years: true
      actual_only: true
      columns:
      - name: Key
        width: 35
      - name: ValType
        width: 18
      - name: AcctName
        width: 25
  taxes:
    sheet_group: taxes
    tables:
    - name: tbl_taxes
      title: Federal and State Taxes
      include_years: true
      columns:
      - name: Line
        width: 45
      - name: Tax document
        width: 12
      - name: Send to
      - name: Source
        width: 50
      - name: actl_source_tab
        width: 12
      - name: fcast_source_tab
      - name: Sign
        width: 8
  capgn:
    sheet_group: taxes
    tables:
    - name: tbl_cap_gn
      title: For Current Year Tax Estimates
      include_years: false
      columns:
      - name: Account
        width: 24
      - name: Security 
        width: 75
      - name: Quantity 
        width: 18
      - name: Acquisition Cost 
      - name: Liquidation Amount 
      - name: Short Term 
      - name: Long Term 
      - name: Total Realized Gain/Loss 
  tax_tables:
    sheet_group: taxes
    tables:
    - name: tbl_fed_tax
      title: Federal Tax Table Married Joint
      include_years: false
      columns:
      - name: Year
        width: 8
      - name: Range
        width: 14
      - name: Rate
      - name: Subtract
    - name: tbl_rmd_1
      title: Reqd Min Distr Table I
      include_years: false
      start_col: 6
      columns:
      - name: Age
        width: 14
      - name: Life Expectancy
        width: 18
      data:
        source: remote
        site_code: FEDREG
        table:
          find_method: caption
          method_parms:
            text: Table 1 to Paragraph (b)
    - name: tbl_uniform_lifetime
      title: Uniform Lifetime Table
      include_years: false
      start_col: 9
      columns:
      - name: Age
        width: 14
      - name: Distribution
        width: 18
      data:
        source: remote
        site_code: FEDREG
        table:
          find_method: caption
          method_parms:
            text: Table 2 to Paragraph (c)
  gen_tables:
    sheet_group: tables
    tables:
    - name: tbl_gen_state
      title: General State
      include_years: false
      columns:
      - name: Item
        width: 18
      - name: Value
      data:
        source: internal
        name: general_state
    - name: tbl_state_tax_facts
      title: State Tax Facts
      include_years: false
      title_row: 5
      columns:
      - name: State
        width: 18
      - name: Top Rate
      - name: Adj to Eff
      - name: Eff Rate
      - name: Brackets
      - name: Tax on SS
      - name: 401K
      - name: IRA
      - name: Private Pension
      - name: Div & Int Rate
      - name: Rules
        width: 40
      - name: Sales Tax
        width: 18
    - name: tbl_part_b
      title: Part B Premium
      include_years: false
      title_row: 18
      columns:
      - name: Year
        width: 14
      - name: Range_low
      - name: Range_high
      - name: Part_B
      - name: Part_D_addl
    - name: tbl_infl
      title: Historical Inflation
      include_years: false
      title_row: 18
      start_col: 7
      columns:
      - name: Year
        width: 18
      - name: Annual CPI
      data:
        source: remote
        site_code: BLS
        api_key: bls # ref in ./private/api_keys.yml
        parameters:
          start_year: 1970
          end_year: 2021
          seriesid: 
          - CUUR0000SA0 # All items in U.S. city average, all urban consumers, not seasonally adjusted

  utility:
    sheet_group: tables
    tables:
    - name: tbl_table_map
      title: Table Locator
      include_years: false
      data:
        source: internal
        name: table_map
      columns:
      - name: Table
        width: 20
      - name: Worksheet

